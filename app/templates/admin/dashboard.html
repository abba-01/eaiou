{% extends "admin/base_admin.html" %}
{% block title %}Admin — eaiou{% endblock %}
{% block page_title %}Admin Dashboard{% endblock %}
{% block nav_dash %}font-semibold{% endblock %}
{% block admin_content %}
<div class="grid grid-cols-2 gap-4 max-w-sm">
  <a href="/admin/users" class="border rounded-lg p-5 hover:shadow-sm transition"
     style="background: var(--ds-surface); border-color: var(--ds-border);">
    <p class="text-3xl font-bold" style="color: var(--ds-ink-1);">{{ user_count }}</p>
    <p class="text-sm mt-1" style="color: var(--ds-ink-2);">Users</p>
  </a>
  <div class="border rounded-lg p-5"
       style="background: var(--ds-surface); border-color: var(--ds-border);">
    <p class="text-3xl font-bold" style="color: var(--ds-ink-1);">{{ group_count }}</p>
    <p class="text-sm mt-1" style="color: var(--ds-ink-2);">Groups</p>
  </div>
</div>
{% endblock %}
