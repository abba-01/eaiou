{% extends "base.html" %}
{% block title %}Not Found — eaiou{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-24 text-center">
    <p class="text-8xl font-bold mb-4" style="color: var(--ds-border);">404</p>
    <h1 class="eaiou-title text-2xl font-bold mb-6" style="color: var(--ds-ink-1);">Page not found</h1>
    <blockquote class="border-l-4 px-5 py-4 rounded-r-md text-left mb-8"
                style="border-left-color: #18171A; background: #F0EFEB;">
        <p style="color: var(--ds-ink-2);">{{ detail or "The page you requested does not exist." }}</p>
    </blockquote>
    <div class="flex justify-center gap-3">
        <a href="/"
           class="inline-flex items-center px-5 py-2.5 text-white text-sm font-medium rounded-md"
           style="background: #18171A;">
            Go home
        </a>
        <a href="/papers/"
           class="inline-flex items-center px-5 py-2.5 bg-white border text-sm font-medium rounded-md"
           style="border-color: var(--ds-border); color: var(--ds-ink-1);">
            Browse papers
        </a>
    </div>
</div>
{% endblock %}
