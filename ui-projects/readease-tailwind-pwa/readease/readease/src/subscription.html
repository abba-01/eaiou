<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscription - ReadEase PWA HTML Template</title>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link
      rel="shortcut icon"
      href="./assets/images/logo.png"
      type="image/x-icon"
    />
  </head>
  <body class="">
    <main
      class="container py-6 min-h-dvh text-b300 bg-y50 pb-28 dark:bg-darkY50 dark:text-white"
    >
      <div class="px-6">
        <div class="flex justify-between items-center">
          <a
            href="./book-details.html"
            class="size-12 bg-b300 text-white flex justify-center items-center rounded-full text-2xl dark:bg-darkB300"
          >
            <i class="ph ph-caret-left"></i>
          </a>
        </div>
        <h1 class="text-3xl font-bold pt-5">Subscription</h1>
        <p class="text-n500 dark:text-darkN500 pt-3 text-sm">
          Which package do you need.
        </p>
      </div>

      <div class="px-6 pt-8 flex flex-col gap-8 subscription-items">
        <div
          class="flex justify-between items-center cursor-pointer p-3 rounded-xl border border-n40 relative item dark:border-n500"
        >
          <p
            class="font-semibold text-sm text-white bg-b300 border border-b300 dark:bg-darkB300 dark:border-darkB300 px-4 py-1 rounded-full absolute -top-[18%] right-14 popular-tag"
          >
            Popular
          </p>
          <div class="">
            <p class="font-medium">Monthly</p>
            <div class="flex justify-start items-center gap-2 pt-2">
              <p class="text-n90 line-through">$50</p>
              <p class="text-b300 dark:text-darkB300 font-bold">$32</p>
            </div>
          </div>

          <i class="ph-fill ph-radio-button text-xl"></i>
        </div>
        <div
          class="flex justify-between items-center cursor-pointer p-3 rounded-xl border border-n40 relative item dark:border-n500"
        >
          <p
            class="font-semibold text-sm border border-b300 dark:border-darkB300 bg-y50 dark:bg-darkY50 px-4 py-1 rounded-full absolute -top-[18%] right-14 popular-tag"
          >
            Best Value
          </p>
          <div class="">
            <p class="font-medium">Annual</p>
            <div class="flex justify-start items-center gap-2 pt-2">
              <p class="text-n90 line-through">$600</p>
              <p class="text-b300 dark:text-darkB300 font-bold">$384</p>
            </div>
          </div>

          <i class="ph ph-radio-button text-xl"></i>
        </div>
        <div
          class="flex justify-between items-center cursor-pointer p-3 rounded-xl border border-n40 relative item dark:border-n500"
        >
          <p
            class="font-semibold text-sm border border-b300 dark:border-darkB300 bg-y50 dark:bg-darkY50 px-4 py-1 rounded-full absolute -top-[18%] right-14 popular-tag"
          >
            Unlimited
          </p>
          <div class="">
            <p class="font-medium">Lifetime Access</p>
            <div class="flex justify-start items-center gap-2 pt-2">
              <p class="text-n90 line-through">$999</p>
              <p class="text-b300 dark:text-darkB300 font-bold">$699</p>
            </div>
          </div>

          <i class="ph ph-radio-button text-xl"></i>
        </div>
      </div>

      <div class="my-3 flex px-6 pt-8">
        <a
          href="./checkout.html"
          class="flex-1 py-3 bg-b300 text-white text-center rounded-xl font-semibold dark:bg-darkB300"
          >Proceed $32</a
        >
      </div>
    </main>

    <!-- ======Javascript Dependencies -->
    <script src="./assets/js/main.js"></script>
  </body>
</html>
