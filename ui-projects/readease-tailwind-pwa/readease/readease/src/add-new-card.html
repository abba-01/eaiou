<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add New Card - ReadEase PWA HTML Template</title>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link
      rel="shortcut icon"
      href="./assets/images/logo.png"
      type="image/x-icon"
    />
  </head>
  <body class="">
    <main
      class="container pt-8 min-h-dvh text-b300 bg-y50 dark:bg-darkY50 dark:text-white"
    >
      <div class="flex justify-between items-center px-6">
        <a
          href="./settings.html"
          class="size-12 bg-b300 dark:bg-darkB300 text-white flex justify-center items-center rounded-full text-2xl"
        >
          <i class="ph ph-caret-left"></i>
        </a>
        <h1 class="text-2xl font-semibold flex-1 pr-12 text-center">
          Add New Card
        </h1>
      </div>
      <div class="">
        <img src="./assets/images/new-card.png" alt="" />
      </div>
      <div class="grid grid-cols-2 px-6 gap-5">
        <div class="flex flex-col justify-start col-span-2">
          <p class="text-sm font-semibold pb-2 dark:text-white">
            Card Holder Name
          </p>
          <div
            class="p-4 bg-n20 border border-n40 dark:bg-darkN20 dark:border-darkN40 rounded-xl"
          >
            <input
              type="text"
              placeholder="Enter email"
              class="w-full bg-transparent outline-none placeholder:text-n90 text-sm dark:text-white"
            />
          </div>
        </div>
        <div class="flex flex-col justify-start col-span-2">
          <p class="text-sm font-semibold pb-2 dark:text-white">Card Number</p>
          <div
            class="p-4 bg-n20 border border-n40 dark:bg-darkN20 dark:border-darkN40 rounded-xl"
          >
            <input
              type="number"
              placeholder="**** **** 6547"
              class="w-full bg-transparent outline-none placeholder:text-n90 text-sm dark:text-white"
            />
          </div>
        </div>
        <div class="flex flex-col justify-start">
          <p class="text-sm font-semibold pb-2 dark:text-white">Exp Date</p>
          <div
            class="p-4 bg-n20 border border-n40 dark:bg-darkN20 dark:border-darkN40 rounded-xl"
          >
            <input
              type="date"
              placeholder="Enter date"
              class="w-full bg-transparent outline-none placeholder:text-n90 text-sm dark:text-white"
            />
          </div>
        </div>
        <div class="flex flex-col justify-start">
          <p class="text-sm font-semibold pb-2 dark:text-white">CVV Code</p>
          <div
            class="p-4 bg-n20 border border-n40 dark:bg-darkN20 dark:border-darkN40 rounded-xl"
          >
            <input
              type="number"
              placeholder="****"
              class="w-full bg-transparent outline-none placeholder:text-n90 text-sm dark:text-white"
            />
          </div>
        </div>
        <div class="flex flex-col justify-start col-span-2">
          <p class="text-sm font-semibold pb-2 dark:text-white">
            Select Country
          </p>
          <div class="relative">
            <div
              class="p-4 flex justify-between items-center gap-2 bg-n20 border border-n40 dark:bg-darkN20 dark:border-darkN40 rounded-xl cursor-pointer selectCountry"
            >
              <p class="text-sm flex-1 selectedItem">United States</p>
              <i class="ph ph-caret-down text-n90 text-lg !leading-none"></i>
            </div>
            <div
              class="bg-white dark:bg-darkN40 p-4 rounded-xl border border-n40 dark:border-darkN40 dark:bg-darkG300 w-full absolute right-0 top-14 max-h-[150px] overflow-y-auto selectCountryModal invisible opacity-0 scale-75 duration-500"
            >
              <ul class="flex flex-col gap-2">
                <li
                  class="text-xs text-n500 dark:text-darkN500 pb-2 border-b border-dashed border-n40 dark:border-darkN40 cursor-pointer item"
                >
                  United States
                </li>
                <li
                  class="text-xs text-n500 dark:text-darkN500 pb-2 border-b border-dashed border-n40 dark:border-darkN40 cursor-pointer item"
                >
                  United Kingdom
                </li>
                <li
                  class="text-xs text-n500 dark:text-darkN500 pb-2 border-b border-dashed border-n40 dark:border-darkN40 cursor-pointer item"
                >
                  Canada
                </li>
                <li
                  class="text-xs text-n500 dark:text-darkN500 pb-2 border-b border-dashed border-n40 dark:border-darkN40 cursor-pointer item"
                >
                  Australia
                </li>
                <li
                  class="text-xs text-n500 dark:text-darkN500 cursor-pointer item"
                >
                  Palestine
                </li>
              </ul>
            </div>
          </div>
        </div>
        <div class="col-span-2">
          <label
            for="remember"
            class="cursor-pointer font-semibold flex gap-3 dark:text-white"
          >
            <input id="remember" class="hidden peer" type="checkbox" />
            <span
              class="border border-n40 dark:border-darkN40 size-6 rounded-md flex justify-center items-center text-transparent peer-checked:text-white peer-checked:bg-b300"
            >
              <i class="ph ph-check"></i>
            </span>
            Save credit information
          </label>
        </div>
      </div>

      <div class="flex px-6 pb-8 pt-14">
        <a
          href="./settings.html"
          class="flex-1 py-3 bg-b300 text-white text-center rounded-xl font-semibold dark:bg-darkB300"
          >Confirm</a
        >
      </div>
    </main>

    <!-- ======Javascript Dependencies -->
    <script src="./assets/js/main.js"></script>
  </body>
</html>
