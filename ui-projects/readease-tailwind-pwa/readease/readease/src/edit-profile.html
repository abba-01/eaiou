<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile - ReadEase PWA HTML Template</title>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link
      rel="shortcut icon"
      href="./assets/images/logo.png"
      type="image/x-icon"
    />
  </head>
  <body class="">
    <main
      class="container pt-8 min-h-dvh text-b300 bg-y50 dark:bg-darkY50 dark:text-white"
    >
      <div class="flex justify-between items-center px-6">
        <a
          href="./settings.html"
          class="size-12 bg-b300 dark:bg-darkB300 text-white flex justify-center items-center rounded-full text-2xl"
        >
          <i class="ph ph-caret-left"></i>
        </a>
        <h1 class="text-2xl font-semibold flex-1 pr-12 text-center">
          Edit Profile
        </h1>
      </div>
      <form class="flex flex-col gap-4 pt-8 px-6">
        <div class="flex flex-col justify-start">
          <p class="text-sm font-semibold pb-2 dark:text-white">First Name</p>
          <div
            class="p-4 bg-n20 border border-n40 dark:bg-darkN20 dark:border-darkN40 rounded-xl"
          >
            <input
              type="text"
              placeholder="Enter first name"
              class="w-full bg-transparent outline-none placeholder:text-n90 text-sm dark:text-white"
            />
          </div>
        </div>
        <div class="flex flex-col justify-start">
          <p class="text-sm font-semibold pb-2 dark:text-white">Last Name</p>
          <div
            class="p-4 bg-n20 border border-n40 dark:bg-darkN20 dark:border-darkN40 rounded-xl"
          >
            <input
              type="text"
              placeholder="Enter last name"
              class="w-full bg-transparent outline-none placeholder:text-n90 text-sm dark:text-white"
            />
          </div>
        </div>
        <div class="flex flex-col justify-start">
          <p class="text-sm font-semibold pb-2 dark:text-white">
            Date of Birth
          </p>
          <div
            class="p-4 bg-n20 border border-n40 dark:bg-darkN20 dark:border-darkN40 rounded-xl"
          >
            <input
              type="date"
              placeholder=""
              class="w-full bg-transparent outline-none placeholder:text-n90 text-sm dark:text-white"
            />
          </div>
        </div>
        <div class="flex flex-col justify-start">
          <p class="text-sm font-semibold pb-2 dark:text-white">Email</p>
          <div
            class="p-4 bg-n20 border border-n40 dark:bg-darkN20 dark:border-darkN40 rounded-xl"
          >
            <input
              type="text"
              placeholder="Enter email"
              class="w-full bg-transparent outline-none placeholder:text-n90 text-sm dark:text-white"
            />
          </div>
        </div>
        <div class="flex flex-col justify-start">
          <p class="text-sm font-semibold pb-2 dark:text-white">Password</p>
          <div
            class="p-4 bg-n20 border border-n40 dark:bg-darkN20 dark:border-darkN40 rounded-xl flex justify-between items-center"
          >
            <input
              type="password"
              placeholder="password"
              class="flex-1 bg-transparent outline-none text-sm passwordField dark:text-white"
            />
            <i
              class="ph ph-eye-slash passowordShow cursor-pointer text-lg !leading-none dark:text-darkB300"
            ></i>
          </div>
        </div>
        <div class="flex flex-col justify-start">
          <p class="text-sm font-semibold pb-2 dark:text-white">
            Confirm Password
          </p>
          <div
            class="p-4 bg-n20 border border-n40 dark:bg-darkN20 dark:border-darkN40 rounded-xl flex justify-between items-center"
          >
            <input
              type="password"
              placeholder="Confirm password"
              class="flex-1 bg-transparent outline-none text-sm confirmPasswordField dark:text-white"
            />
            <i
              class="ph ph-eye-slash confirmPasswordShow cursor-pointer dark:text-darkB300 text-lg !leading-none"
            ></i>
          </div>
        </div>

        <div class="my-3 flex">
          <a
            href=""
            class="flex-1 py-3 bg-b300 dark:bg-darkB300 text-white text-center rounded-xl font-semibold"
            >Save</a
          >
        </div>
      </form>
    </main>

    <!-- ======Javascript Dependencies -->
    <script src="./assets/js/main.js"></script>
  </body>
</html>
