<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Settings - ReadEase PWA HTML Template</title>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link
      rel="shortcut icon"
      href="./assets/images/logo.png"
      type="image/x-icon"
    />
  </head>
  <body class="">
    <main
      class="container pt-8 min-h-dvh text-b300 bg-y50 dark:bg-darkY50 dark:text-white"
    >
      <div class="flex justify-between items-center px-6">
        <a
          href="./settings.html"
          class="size-12 bg-b300 text-white flex justify-center items-center rounded-full text-2xl"
        >
          <i class="ph ph-caret-left"></i>
        </a>
        <h1 class="text-2xl font-semibold flex-1 pr-12 text-center">
          Language
        </h1>
      </div>

      <div
        class="mt-8 p-6 border border-y100 rounded-2xl mx-6 dark:border-darkN40"
      >
        <p
          class="border-b border-dashed border-n40 pb-6 font-semibold text-p1 dark:border-darkN40 text-y300"
        >
          Suggested
        </p>
        <div class="suggested-languages flex flex-col gap-4 pt-5">
          <div
            class="item flex cursor-pointer items-center justify-between border-b border-dashed border-n40 pb-5 dark:border-darkN40"
          >
            <p class="font-medium dark:text-white">English (UK)</p>
            <i class="ph-fill ph-radio-button text-2xl radioButton"></i>
          </div>
          <div class="item flex cursor-pointer items-center justify-between">
            <p class="font-medium dark:text-white">English (US)</p>
            <i class="ph ph-radio-button text-2xl radioButton"></i>
          </div>
        </div>
      </div>

      <div
        class="mt-8 p-6 border border-y100 rounded-2xl mx-6 dark:border-darkN40"
      >
        <p
          class="border-b border-dashed border-n40 pb-6 font-semibold text-p1 dark:border-darkN40 text-y300"
        >
          Languages
        </p>
        <div class="other-languages flex flex-col gap-4 pt-5">
          <div
            class="item flex cursor-pointer items-center justify-between border-b border-dashed border-n40 pb-5 dark:border-darkN40"
          >
            <p class="font-medium dark:text-white">Portugal</p>
            <i class="ph ph-radio-button text-2xl radioButton"></i>
          </div>
          <div
            class="item flex cursor-pointer items-center justify-between border-b border-dashed border-n40 pb-5 dark:border-darkN40"
          >
            <p class="font-medium dark:text-white">Kiribati</p>
            <i class="ph ph-radio-button text-2xl radioButton"></i>
          </div>
          <div
            class="item flex cursor-pointer items-center justify-between border-b border-dashed border-n40 pb-5 dark:border-darkN40"
          >
            <p class="font-medium dark:text-white">Palau</p>
            <i class="ph ph-radio-button text-2xl radioButton"></i>
          </div>
          <div
            class="item flex cursor-pointer items-center justify-between border-b border-dashed border-n40 pb-5 dark:border-darkN40"
          >
            <p class="font-medium dark:text-white">South Sudan</p>
            <i class="ph ph-radio-button text-2xl radioButton"></i>
          </div>
          <div
            class="item flex cursor-pointer items-center justify-between border-b border-dashed border-n40 pb-5 dark:border-darkN40"
          >
            <p class="font-medium dark:text-white">Niue</p>
            <i class="ph ph-radio-button text-2xl radioButton"></i>
          </div>
          <div
            class="item flex cursor-pointer items-center justify-between border-b border-dashed border-n40 pb-5 dark:border-darkN40"
          >
            <p class="font-medium dark:text-white">Qatar</p>
            <i class="ph ph-radio-button text-2xl radioButton"></i>
          </div>
          <div
            class="item flex cursor-pointer items-center justify-between border-b border-dashed border-n40 pb-5 dark:border-darkN40"
          >
            <p class="font-medium dark:text-white">France</p>
            <i class="ph ph-radio-button text-2xl radioButton"></i>
          </div>
          <div
            class="item flex cursor-pointer items-center justify-between border-b border-dashed border-n40 pb-5 dark:border-darkN40"
          >
            <p class="font-medium dark:text-white">Gambia</p>
            <i class="ph ph-radio-button text-2xl radioButton"></i>
          </div>
          <div
            class="item flex cursor-pointer items-center justify-between border-b border-dashed border-n40 pb-5 dark:border-darkN40"
          >
            <p class="font-medium dark:text-white">Macao</p>
            <i class="ph ph-radio-button text-2xl radioButton"></i>
          </div>
          <div
            class="item flex cursor-pointer items-center justify-between border-b border-dashed border-n40 pb-5 dark:border-darkN40"
          >
            <p class="font-medium dark:text-white">Argentina</p>
            <i class="ph ph-radio-button text-2xl radioButton"></i>
          </div>
          <div class="item flex cursor-pointer items-center justify-between">
            <p class="font-medium dark:text-white">Palestine</p>
            <i class="ph ph-radio-button text-2xl radioButton"></i>
          </div>
        </div>
      </div>

      <div class="pb-8 flex px-6 pt-8">
        <a
          href="./settings.html"
          class="flex-1 py-3 bg-b300 text-white text-center rounded-xl dark:bg-darkB300"
          >Save</a
        >
      </div>
    </main>

    <!-- ======Javascript Dependencies -->
    <script src="./assets/js/main.js"></script>
  </body>
</html>
