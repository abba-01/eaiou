<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - ReadEase PWA HTML Template</title>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link
      rel="shortcut icon"
      href="./assets/images/logo.png"
      type="image/x-icon"
    />
  </head>
  <body class="">
    <div
      class="container px-6 pb-8 pt-12 min-h-dvh text-b300 bg-y50 dark:bg-darkY50 dark:text-white"
    >
      <div class="flex justify-center items-center text-center flex-col">
        <h1 class="text-2xl font-medium dark:text-white">Forgot Password</h1>
        <p class="tet-sm text-n500 dark:text-darkN500 pt-3 px-4">
          Stay connected, follow authors, and never miss thrilling Stay
          connected
        </p>
      </div>

      <form class="flex flex-col gap-4 pt-8">
        <div class="flex flex-col justify-start">
          <p class="text-sm font-semibold pb-2 dark:text-white">Email</p>
          <div
            class="p-4 bg-n20 border border-n40 dark:bg-darkN20 dark:border-darkN40 rounded-xl"
          >
            <input
              type="text"
              placeholder="Enter email"
              class="w-full bg-transparent outline-none placeholder:text-n90 text-sm dark:text-white"
            />
          </div>
        </div>

        <div class="mt-40 flex">
          <a
            href="verify-otp.html"
            class="flex-1 py-3 bg-b300 text-white text-center rounded-xl font-semibold dark:bg-darkB300"
            >Send OTP</a
          >
        </div>
      </form>
    </div>

    <!-- ======Javascript Dependencies -->
    <script src="./assets/js/main.js"></script>
  </body>
</html>
