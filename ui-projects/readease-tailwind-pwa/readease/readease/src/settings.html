<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - ReadEase PWA HTML Template</title>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link
      rel="shortcut icon"
      href="./assets/images/logo.png"
      type="image/x-icon"
    />
  </head>
  <body class="">
    <!-- Splash Screen Start -->
    <div class="preloader inset-0 z-50 fixed">
      <div
        class="h-full bg-y50 flex flex-col justify-center items-center text-center container"
      >
        <div class="zoomInOut">
          <div class="flex justify-center items-center">
            <img src="./assets/images/logo.png" alt="" />
          </div>
          <p class="pt-6 text-4xl font-bold text-y300">ReadEase</p>
        </div>
      </div>
    </div>
    <!-- Splash Screen End -->
    <main
      class="container pt-8 min-h-dvh text-b300 bg-y50 dark:bg-darkY50 dark:text-white pb-24"
    >
      <div class="flex justify-between items-center px-6">
        <a
          href="./home.html"
          class="size-12 bg-b300 text-white flex justify-center items-center rounded-full text-2xl dark:bg-darkB300"
        >
          <i class="ph ph-caret-left"></i>
        </a>
        <h1 class="text-2xl font-semibold flex-1 pr-12 text-center">
          Settings
        </h1>
      </div>
      <div
        class="flex mt-8 justify-between items-center bg-b300 dark:bg-darkB300 p-6 rounded-2xl text-white mx-6"
      >
        <div class="flex justify-start items-center gap-4">
          <img
            src="./assets/images/user.png"
            class="size-16 rounded-full"
            alt=""
          />
          <div class="">
            <h2 class="heading-2 font-semibold text-xl">Nayeem Khan</h2>
            <p class="pt-1">example@mail.com</p>
          </div>
        </div>
        <a
          href="./edit-profile.html"
          class="text-xl size-11 rounded-full bg-white flex justify-center items-center text-b300 myQrCodeModalOpenButton"
        >
          <i class="ph ph-pencil-simple-line"></i>
        </a>
      </div>
      <div class="pt-8 flex flex-col gap-5">
        <a
          href="./notification-settings.html"
          class="flex justify-between items-center pb-5 border-b border-dashed border-n40 dark:border-darkN40 px-6"
        >
          <div class="flex justify-start items-center gap-4">
            <div
              class="text-xl size-11 rounded-full border border-y100 flex justify-center items-center dark:bg-n0 dark:border-darkN40"
            >
              <i class="ph ph-bell text-y300 dark:text-darkB300"></i>
            </div>
            <p class="font-semibold text-lg">Notifications</p>
          </div>
          <div class="">
            <i class="ph ph-caret-right text-xl text-n70 dark:text-white"></i>
          </div>
        </a>
        <a
          href="./add-new-card.html"
          class="flex justify-between items-center pb-5 border-b border-dashed border-n40 dark:border-darkN40 px-6"
        >
          <div class="flex justify-start items-center gap-4">
            <div
              class="text-xl size-11 rounded-full border border-y100 flex justify-center items-center dark:bg-n0 dark:border-darkN40"
            >
              <i class="ph ph-credit-card text-y300 dark:text-darkB300"></i>
            </div>
            <p class="font-semibold text-lg">Add New Card</p>
          </div>
          <div class="">
            <i class="ph ph-caret-right text-xl text-n70 dark:text-white"></i>
          </div>
        </a>

        <a
          href="./help-center.html"
          class="flex justify-between items-center pb-5 border-b border-dashed border-n40 dark:border-darkN40 px-6"
        >
          <div class="flex justify-start items-center gap-4">
            <div
              class="text-xl size-11 rounded-full border border-y100 flex justify-center items-center dark:bg-n0 dark:border-darkN40"
            >
              <i class="ph ph-headset text-y300 dark:text-darkB300"></i>
            </div>
            <p class="font-semibold text-lg">Help Center</p>
          </div>
          <div class="">
            <i class="ph ph-caret-right text-xl text-n70 dark:text-white"></i>
          </div>
        </a>
        <a
          href="./language-settings.html"
          class="flex justify-between items-center pb-5 border-b border-dashed border-n40 dark:border-darkN40 px-6"
        >
          <div class="flex justify-start items-center gap-4">
            <div
              class="text-xl size-11 rounded-full border border-y100 flex justify-center items-center dark:bg-n0 dark:border-darkN40"
            >
              <i class="ph ph-translate text-y300 dark:text-darkB300"></i>
            </div>
            <p class="font-semibold text-lg">Language</p>
          </div>
          <div class="">
            <i class="ph ph-caret-right text-xl text-n70 dark:text-white"></i>
          </div>
        </a>
        <div
          class="choose-mode flex cursor-pointer items-center justify-between pb-5 border-b border-dashed border-n40 dark:border-darkN40 px-6"
        >
          <div class="flex items-center justify-start gap-4">
            <div
              class="text-xl size-11 rounded-full border border-y100 flex justify-center items-center dark:bg-n0 dark:border-darkN40"
            >
              <i class="ph ph-sun icon text-y300 dark:text-darkB300"></i>
            </div>
            <p class="font-semibold dark:text-white">Dark Mode</p>
          </div>
          <div
            class="relative h-6 w-11 rounded-full bg-n40 dark:bg-darkB300 duration-500"
          >
            <div
              class="absolute left-0.5 top-0.5 size-[20px] rounded-full bg-white duration-500 dark:left-[22px]"
            ></div>
          </div>
        </div>

        <a
          href="./privacy-policy.html"
          class="flex justify-between items-center pb-5 border-b border-dashed border-n40 dark:border-darkN40 px-6"
        >
          <div class="flex justify-start items-center gap-4">
            <div
              class="text-xl size-11 rounded-full border border-y100 flex justify-center items-center dark:bg-n0 dark:border-darkN40"
            >
              <i class="ph ph-file text-y300 dark:text-darkB300"></i>
            </div>
            <p class="font-semibold text-lg">Privacy Policy</p>
          </div>
          <div class="">
            <i class="ph ph-caret-right text-xl text-n70 dark:text-white"></i>
          </div>
        </a>
        <a
          href="./about-us.html"
          class="flex justify-between items-center pb-5 border-b border-dashed border-n40 dark:border-darkN40 px-6"
        >
          <div class="flex justify-start items-center gap-4">
            <div
              class="text-xl size-11 rounded-full border border-y100 flex justify-center items-center dark:bg-n0 dark:border-darkN40"
            >
              <i class="ph ph-file text-y300 dark:text-darkB300"></i>
            </div>
            <p class="font-semibold text-lg">About ReadEase</p>
          </div>
          <div class="">
            <i class="ph ph-caret-right text-xl text-n70 dark:text-white"></i>
          </div>
        </a>
        <div
          class="flex justify-between items-center pb-5 logoutModalOpenButton cursor-pointer px-6 text-b300 dark:text-darkB300"
        >
          <div class="flex justify-start items-center gap-4 cursor-pointer">
            <div
              class="text-xl size-11 rounded-full border border-y100 flex justify-center items-center dark:bg-n0 dark:border-darkN40"
            >
              <i class="ph ph-sign-out text-y300 dark:text-darkB300"></i>
            </div>
            <p class="font-semibold">Logout</p>
          </div>
        </div>
      </div>

      <!-- Logout Modal Start -->
      <div class="logoutModal bottom-modal container fixed inset-0 z-50">
        <div
          class="modalBg absolute inset-0 w-full bg-black opacity-30 dark:bg-white"
        ></div>
        <div
          class="modal relative z-10 flex h-full flex-col items-end justify-end text-center dark:text-white"
        >
          <div class="absolute bottom-0 left-0 right-0">
            <img
              src="./assets/images/rounded-modal-white-bg.png"
              alt=""
              class="block dark:hidden"
            />
            <img
              src="./assets/images/rounded-modal-black-bg.png"
              alt=""
              class="hidden dark:block"
            />
          </div>
          <div class="relative w-full overflow-y-auto">
            <div class="px-6 pt-8">
              <div class="flex flex-col items-center justify-center gap-3">
                <p
                  class="w-full text-center text-2xl font-bold border-b border-n40 dark:border-darkN40 border-dashed pb-5 text-g300"
                >
                  Logout
                </p>
                <p class="text-center text-n500 dark:text-darkN500">
                  Do you want to logout?
                </p>
              </div>
            </div>

            <div class="px-6 py-8">
              <div class="flex justify-between items-center gap-4">
                <button
                  class="flex-1 py-3 font-medium text-center rounded-xl border border-b300 text-b300 dark:text-darkB300 dark:border-darkB300 logoutModalCloseButton"
                >
                  Cancel
                </button>
                <a
                  href="./sign-in.html"
                  class="flex-1 py-3 bg-b300 text-white text-center rounded-xl font-medium border border-b300 dark:border-darkB300 dark:bg-darkB300"
                >
                  Yes, Logout
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Logout Modal End -->

      <div class="fixed bottom-0 left-0 right-0 container z-30">
        <div
          class="p-6 bg-b300 rounded-t-3xl flex justify-between items-center"
        >
          <a
            href="./home.html"
            class="flex flex-col gap-1 justify-center items-center"
          >
            <i class="ph ph-house text-3xl !leading-none text-white"></i>
            <p class="text-xs font-semibold text-white">Home</p>
          </a>
          <a
            href="./books.html"
            class="flex flex-col gap-1 justify-center items-center"
          >
            <i class="ph ph-book-open text-3xl !leading-none text-white"></i>
            <p class="text-xs font-semibold text-white">Books</p>
          </a>
          <a
            href="./audiobooks.html"
            class="flex flex-col gap-1 justify-center items-center"
          >
            <i class="ph ph-headphones text-3xl !leading-none text-white"></i>
            <p class="text-xs font-semibold text-white">Audiobooks</p>
          </a>
          <a
            href="./library.html"
            class="flex flex-col gap-1 justify-center items-center"
          >
            <i class="ph ph-book text-3xl !leading-none text-white"></i>
            <p class="text-xs font-semibold text-white">Library</p>
          </a>
          <a
            href="./settings.html"
            class="flex flex-col gap-1 justify-center items-center"
          >
            <i class="ph-fill ph-gear-six text-3xl !leading-none text-y200"></i>
            <p class="text-xs font-semibold text-white">Settings</p>
          </a>
        </div>
      </div>
    </main>

    <!-- ======Javascript Dependencies -->
    <script src="./assets/js/main.js"></script>
  </body>
</html>
